[job-exec "lumapost-morning"]
schedule = 0 6 * * *
command = docker compose -f /app/docker-compose.yml run --rm lumapost all:morning

[job-exec "lumapost-noon"]
schedule = 0 12 * * *
command = docker compose -f /app/docker-compose.yml run --rm lumapost all:noon

[job-exec "lumapost-afternoon"]
schedule = 0 16 * * *
command = docker compose -f /app/docker-compose.yml run --rm lumapost all:afternoon

[job-exec "lumapost-evening"]
schedule = 0 0 * * *
command = docker compose -f /app/docker-compose.yml run --rm lumapost all:evening
